<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World History - Interactive Timeline Map</title>
    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-J75F52HWJG"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-J75F52HWJG');
    </script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css?v=3" />
</head>
<body>
    <!-- Top Bar -->
    <header id="top-bar">
        <div class="top-bar-left">
            <a href="/" class="logo-link">
                <svg class="logo-icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <ellipse cx="12" cy="12" rx="4" ry="10"/>
                    <path d="M2 12h20"/>
                    <path d="M4.5 6.5h15"/>
                    <path d="M4.5 17.5h15"/>
                </svg>
                <span class="logo-text">World<span class="logo-accent">History</span></span>
            </a>
            <nav class="top-nav">
                <a href="about.html" class="nav-link">About</a>
            </nav>
        </div>
        <div class="top-bar-right">
            <label class="toggle-borders" title="Toggle modern country names and borders">
                <input type="checkbox" id="borders-toggle" checked />
                <span>Show Countries</span>
            </label>
            <button id="donate-btn" class="btn-donate" title="Support this project">
                <svg viewBox="0 0 20 20" width="14" height="14" fill="currentColor" style="vertical-align:-2px;margin-right:4px;"><path d="M10 18s-7.5-5.5-7.5-10A4.5 4.5 0 0 1 10 5a4.5 4.5 0 0 1 7.5 3c0 4.5-7.5 10-7.5 10z"/></svg>
                Support
            </button>
            <a href="https://github.com/kevinraynor/visualworldhistory" target="_blank" rel="noopener noreferrer" class="btn-github" title="View on GitHub">
                <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor" style="vertical-align:-2px;margin-right:4px;"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                GitHub
            </a>
            <div id="user-menu">
                <button id="auth-btn" class="btn-auth">Sign In</button>
            </div>
        </div>
    </header>

    <!-- Map Controls -->
    <div id="map-controls">
        <div class="control-section">
            <div class="control-label">Detail Level</div>
            <button class="granularity-btn active" data-level="major">Major</button>
            <button class="granularity-btn active" data-level="notable">Notable</button>
            <button class="granularity-btn active" data-level="detailed">Detailed</button>
        </div>
        <div class="control-divider"></div>
        <div class="control-section">
            <div class="control-label">Categories</div>
            <div class="legend-items">
                <div class="legend-item category-btn active" data-category="empire"><span class="legend-dot" data-color="#7B8FB2" style="background:#7B8FB2"></span>Empire</div>
                <div class="legend-item category-btn active" data-category="war"><span class="legend-dot" data-color="#C27C7C" style="background:#C27C7C"></span>War</div>
                <div class="legend-item category-btn active" data-category="civilization"><span class="legend-dot" data-color="#8BAA7C" style="background:#8BAA7C"></span>Civilization</div>
                <div class="legend-item category-btn active" data-category="discovery"><span class="legend-dot" data-color="#C9A85C" style="background:#C9A85C"></span>Discovery</div>
                <div class="legend-item category-btn active" data-category="religion"><span class="legend-dot" data-color="#A88BC2" style="background:#A88BC2"></span>Religion</div>
                <div class="legend-item category-btn active" data-category="cultural"><span class="legend-dot" data-color="#7BB8C2" style="background:#7BB8C2"></span>Cultural</div>
                <div class="legend-item category-btn active" data-category="trade"><span class="legend-dot" data-color="#C2A07B" style="background:#C2A07B"></span>Trade</div>
            </div>
        </div>
    </div>

    <!-- Ad Space -->
    <aside id="ad-space">
        <div class="ad-placeholder">
            <span>Ad Space 1</span>
        </div>
        <div class="ad-placeholder">
            <span>Ad Space 2</span>
        </div>
    </aside>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Year Display -->
    <div id="year-display">
        <button id="year-prev" class="year-step-btn" title="Go back 1 year">&#9664;</button>
        <span id="current-year-label">1569 AD</span>
        <div id="year-input-container" style="display:none;">
            <input type="number" id="year-input" min="0" max="10000" step="1" />
            <div id="year-era-toggle">
                <button class="era-btn" data-era="BC">BC</button>
                <button class="era-btn active" data-era="AD">AD</button>
            </div>
        </div>
        <button id="year-next" class="year-step-btn" title="Go forward 1 year">&#9654;</button>
    </div>

    <!-- Map Style Switcher -->
    <div id="map-style-switcher">
        <button class="style-option active" data-style="light" title="Light">
            <span class="style-swatch" style="background:#e8e8e8"></span>Light
        </button>
        <button class="style-option" data-style="terrain" title="Terrain">
            <span class="style-swatch" style="background:#c5d1a0"></span>Terrain
        </button>
    </div>

    <!-- Timeline -->
    <div id="timeline-container">
        <canvas id="timeline-canvas"></canvas>
    </div>

    <!-- Side Panel -->
    <div id="side-panel" class="panel-closed">
        <button id="panel-close" class="panel-close-btn">&times;</button>
        <div id="panel-content">
            <div id="panel-loading" class="panel-loading">Loading...</div>
            <div id="panel-body" style="display:none;">
                <div id="panel-header">
                    <h2 id="panel-title"></h2>
                    <p id="panel-dates" class="panel-dates"></p>
                    <span id="panel-category" class="panel-category-badge"></span>
                    <button id="panel-favorite" class="btn-favorite" title="Add to favorites">&#9734;</button>
                </div>
                <div id="panel-summary"></div>
                <div id="panel-images" style="display:none;">
                    <h3>Images</h3>
                    <div id="panel-image-gallery" class="image-gallery"></div>
                </div>
                <div id="panel-figures" style="display:none;">
                    <h3>Key Figures/Artifacts</h3>
                    <div id="panel-figures-grid" class="figures-grid"></div>
                </div>
                <div id="panel-links">
                    <h3>Read More</h3>
                    <ul id="panel-link-list"></ul>
                </div>
                <div id="panel-comments">
                    <h3>Comments</h3>
                    <div id="comment-form-container"></div>
                    <div id="comments-list"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="auth-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <h2 id="auth-modal-title">Sign In</h2>
            <form id="auth-form">
                <div id="auth-username-group" class="form-group">
                    <label for="auth-username">Username</label>
                    <input type="text" id="auth-username" name="username" required minlength="3" maxlength="50" />
                </div>
                <div id="auth-email-group" class="form-group" style="display:none;">
                    <label for="auth-email">Email</label>
                    <input type="email" id="auth-email" name="email" />
                </div>
                <div class="form-group">
                    <label for="auth-password">Password</label>
                    <input type="password" id="auth-password" name="password" required minlength="8" />
                </div>
                <div id="auth-error" class="form-error"></div>
                <button type="submit" class="btn-primary" id="auth-submit">Sign In</button>
                <p class="auth-switch">
                    <span id="auth-switch-text">Don't have an account?</span>
                    <a href="#" id="auth-switch-link">Register</a>
                </p>
            </form>
        </div>
    </div>

    <!-- Image Lightbox -->
    <div id="lightbox-overlay" class="lightbox-overlay" style="display:none;">
        <button class="lightbox-close">&times;</button>
        <img id="lightbox-img" class="lightbox-img" alt="" />
        <p id="lightbox-caption" class="lightbox-caption"></p>
        <button id="lightbox-prev" class="lightbox-nav lightbox-prev-btn">&#8249;</button>
        <button id="lightbox-next" class="lightbox-nav lightbox-next-btn">&#8250;</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="js/app.js?v=3"></script>
</body>
</html>
